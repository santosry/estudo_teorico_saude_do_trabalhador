name: ci

# Auditoria contínua SEM dados sintéticos: os testes usam exclusivamente os dados REAIS
# versionados no repositório (bases processadas, tabelas, logs de proveniência).
# Etapas que exigem os brutos CAT (1,8 GB, não versionados) ou rede (TabNet/CNES)
# são puladas automaticamente pelos próprios testes (skipif) e NÃO são simuladas.

on:
  push:
  pull_request:

jobs:
  auditoria:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r metadados/requirements.txt
          pip install dbfread pandas pytest openpyxl

      - name: LibreOffice (headless)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends libreoffice-writer-nogui fonts-liberation || true

      - name: Testes (dados reais versionados)
        run: python -m pytest tests -q -v
